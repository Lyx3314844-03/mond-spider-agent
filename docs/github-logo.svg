<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#020810"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7b2fff"/>
      <stop offset="100%" style="stop-color:#ff006e"/>
    </linearGradient>
    <linearGradient id="legR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="legL" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="64"/>
  <!-- Hex web -->
  <g transform="translate(256,240)" opacity="0.1" stroke="#00f5ff" fill="none" stroke-width="1.2">
    <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45"/>
    <polygon points="0,-140 121,-70 121,70 0,140 -121,70 -121,-70"/>
    <polygon points="0,-190 165,-95 165,95 0,190 -165,95 -165,-95"/>
  </g>
  <!-- Radial lines -->
  <g transform="translate(256,240)" opacity="0.12" stroke="#00f5ff" stroke-width="0.8">
    <line x1="0" y1="0" x2="0" y2="-230"/><line x1="0" y1="0" x2="200" y2="-115"/>
    <line x1="0" y1="0" x2="200" y2="115"/><line x1="0" y1="0" x2="0" y2="230"/>
    <line x1="0" y1="0" x2="-200" y2="115"/><line x1="0" y1="0" x2="-200" y2="-115"/>
    <line x1="0" y1="0" x2="115" y2="-200"/><line x1="0" y1="0" x2="115" y2="200"/>
    <line x1="0" y1="0" x2="-115" y2="-200"/><line x1="0" y1="0" x2="-115" y2="200"/>
    <line x1="0" y1="0" x2="230" y2="0"/><line x1="0" y1="0" x2="-230" y2="0"/>
  </g>
  <circle cx="256" cy="240" r="150" fill="url(#glow)" filter="url(#glow2)"/>
  <!-- Legs -->
  <g filter="url(#glow1)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M274,225 Q310,200 360,165 Q385,150 420,140" stroke="url(#legR)"/>
    <path d="M278,238 Q320,230 375,220 Q405,215 445,220" stroke="url(#legR)"/>
    <path d="M278,252 Q320,262 375,278 Q405,288 445,298" stroke="url(#legR)"/>
    <path d="M274,262 Q310,285 360,325 Q385,345 420,360" stroke="url(#legR)"/>
    <path d="M238,225 Q202,200 152,165 Q127,150 92,140" stroke="url(#legL)"/>
    <path d="M234,238 Q192,230 137,220 Q107,215 67,220" stroke="url(#legL)"/>
    <path d="M234,252 Q192,262 137,278 Q107,288 67,298" stroke="url(#legL)"/>
    <path d="M238,262 Q202,285 152,325 Q127,345 92,360" stroke="url(#legL)"/>
  </g>
  <!-- Leg nodes -->
  <g filter="url(#glow1)">
    <circle cx="420" cy="140" r="5" fill="#00d4ff"/><circle cx="445" cy="220" r="5" fill="#7b2fff"/>
    <circle cx="445" cy="298" r="5" fill="#ff006e"/><circle cx="420" cy="360" r="5" fill="#00ff88"/>
    <circle cx="92" cy="140" r="5" fill="#ffbe0b"/><circle cx="67" cy="220" r="5" fill="#00d4ff"/>
    <circle cx="67" cy="298" r="5" fill="#7b2fff"/><circle cx="92" cy="360" r="5" fill="#ff006e"/>
  </g>
  <!-- Body -->
  <g transform="translate(256,240)" filter="url(#glow1)">
    <ellipse cx="0" cy="18" rx="26" ry="34" fill="url(#body)" opacity="0.9"/>
    <ellipse cx="0" cy="-16" rx="20" ry="18" fill="url(#body)" opacity="0.95"/>
    <circle cx="-7" cy="-23" r="4" fill="#00f5ff"/><circle cx="7" cy="-23" r="4" fill="#00f5ff"/>
    <circle cx="-7" cy="-23" r="2" fill="#fff"/><circle cx="7" cy="-23" r="2" fill="#fff"/>
    <line x1="-9" y1="-3" x2="9" y2="-3" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="-13" x2="0" y2="13" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <circle cx="-9" cy="-3" r="2" fill="#00f5ff" opacity="0.7"/>
    <circle cx="9" cy="-3" r="2" fill="#00f5ff" opacity="0.7"/>
    <circle cx="0" cy="13" r="2" fill="#ff006e" opacity="0.7"/>
  </g>
  <!-- Title -->
  <text x="256" y="430" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="42" font-weight="bold" fill="#fff">Mond Spider</text>
  <text x="256" y="462" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" fill="#00f5ff" letter-spacing="5" opacity="0.8">AGENT  v6.1</text>
</svg>