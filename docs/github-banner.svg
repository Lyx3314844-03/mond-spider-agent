<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b2fff" />
      <stop offset="50%" style="stop-color:#00f5ff" />
      <stop offset="100%" style="stop-color:#00ff88" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b2fff;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#7b2fff;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7b2fff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7b2fff;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:0" />
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" />

  <!-- Glow orbs -->
  <ellipse cx="250" cy="200" rx="200" ry="200" fill="url(#glow1)" />
  <ellipse cx="950" cy="180" rx="250" ry="250" fill="url(#glow2)" />

  <!-- Spider web network - subtle connecting lines -->
  <g stroke="#7b2fff" stroke-width="0.5" opacity="0.3">
    <line x1="100" y1="80" x2="300" y2="150" />
    <line x1="300" y1="150" x2="500" y2="90" />
    <line x1="500" y1="90" x2="700" y2="160" />
    <line x1="700" y1="160" x2="900" y2="100" />
    <line x1="900" y1="100" x2="1100" y2="140" />
    <line x1="200" y1="300" x2="400" y2="320" />
    <line x1="400" y1="320" x2="600" y2="280" />
    <line x1="600" y1="280" x2="800" y2="330" />
    <line x1="800" y1="330" x2="1000" y2="290" />
    <line x1="300" y1="150" x2="400" y2="320" />
    <line x1="500" y1="90" x2="600" y2="280" />
    <line x1="700" y1="160" x2="800" y2="330" />
    <line x1="900" y1="100" x2="1000" y2="290" />
    <line x1="100" y1="80" x2="200" y2="300" />
    <line x1="1100" y1="140" x2="1000" y2="290" />
  </g>

  <!-- Network nodes -->
  <g filter="url(#neon)">
    <circle cx="100" cy="80" r="3" fill="#7b2fff" opacity="0.7" />
    <circle cx="300" cy="150" r="4" fill="#7b2fff" opacity="0.8" />
    <circle cx="500" cy="90" r="3" fill="#00f5ff" opacity="0.7" />
    <circle cx="700" cy="160" r="4" fill="#00f5ff" opacity="0.8" />
    <circle cx="900" cy="100" r="3" fill="#00ff88" opacity="0.7" />
    <circle cx="1100" cy="140" r="3" fill="#00ff88" opacity="0.6" />
    <circle cx="200" cy="300" r="3" fill="#7b2fff" opacity="0.6" />
    <circle cx="400" cy="320" r="3" fill="#00f5ff" opacity="0.6" />
    <circle cx="600" cy="280" r="4" fill="#00f5ff" opacity="0.7" />
    <circle cx="800" cy="330" r="3" fill="#00ff88" opacity="0.6" />
    <circle cx="1000" cy="290" r="3" fill="#00ff88" opacity="0.7" />
  </g>

  <!-- Floating particles -->
  <circle cx="150" cy="180" r="1.5" fill="#7b2fff" opacity="0.5" />
  <circle cx="350" cy="60" r="1" fill="#00f5ff" opacity="0.4" />
  <circle cx="550" cy="350" r="1.5" fill="#00ff88" opacity="0.4" />
  <circle cx="750" cy="50" r="1" fill="#7b2fff" opacity="0.3" />
  <circle cx="950" cy="350" r="1.5" fill="#00f5ff" opacity="0.4" />
  <circle cx="1050" cy="200" r="1" fill="#00ff88" opacity="0.3" />
  <circle cx="80" cy="250" r="1" fill="#7b2fff" opacity="0.3" />
  <circle cx="450" cy="220" r="1.5" fill="#00f5ff" opacity="0.3" />

  <!-- Spider icon (stylized) -->
  <g transform="translate(170, 160)" filter="url(#softGlow)" opacity="0.6">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#7b2fff" stroke-width="1.5" />
    <circle cx="0" cy="0" r="5" fill="#7b2fff" opacity="0.5" />
    <!-- Legs -->
    <line x1="-8" y1="-8" x2="-25" y2="-25" stroke="#7b2fff" stroke-width="1" />
    <line x1="8" y1="-8" x2="25" y2="-25" stroke="#7b2fff" stroke-width="1" />
    <line x1="-10" y1="0" x2="-28" y2="-5" stroke="#7b2fff" stroke-width="1" />
    <line x1="10" y1="0" x2="28" y2="-5" stroke="#7b2fff" stroke-width="1" />
    <line x1="-8" y1="8" x2="-25" y2="20" stroke="#7b2fff" stroke-width="1" />
    <line x1="8" y1="8" x2="25" y2="20" stroke="#7b2fff" stroke-width="1" />
    <line x1="-5" y1="10" x2="-15" y2="28" stroke="#7b2fff" stroke-width="1" />
    <line x1="5" y1="10" x2="15" y2="28" stroke="#7b2fff" stroke-width="1" />
  </g>

  <!-- Main title: MOND -->
  <text x="600" y="185" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="100" fill="url(#titleGrad)" filter="url(#neon)" letter-spacing="20">MOND</text>

  <!-- Subtitle: SPIDER AGENT -->
  <text x="600" y="235" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="32" fill="#ffffff" opacity="0.9" letter-spacing="18">SPIDER AGENT</text>

  <!-- Divider line -->
  <rect x="300" y="255" width="600" height="1.5" fill="url(#lineGrad)" rx="1" />

  <!-- Tagline -->
  <text x="600" y="290" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="18" fill="#00f5ff" opacity="0.8">Self-Evolving AI Crawler Platform</text>

  <!-- Tech badges row -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600">
    <!-- Go -->
    <rect x="340" y="315" width="50" height="24" rx="12" fill="#00ADD8" opacity="0.15" stroke="#00ADD8" stroke-width="0.8" opacity="0.4" />
    <text x="365" y="331" text-anchor="middle" fill="#00ADD8" opacity="0.8">Go</text>
    <!-- Python -->
    <rect x="400" y="315" width="65" height="24" rx="12" fill="#3776AB" opacity="0.15" stroke="#3776AB" stroke-width="0.8" />
    <text x="432" y="331" text-anchor="middle" fill="#FFD43B" opacity="0.8">Python</text>
    <!-- Java -->
    <rect x="475" y="315" width="55" height="24" rx="12" fill="#ED8B00" opacity="0.15" stroke="#ED8B00" stroke-width="0.8" />
    <text x="502" y="331" text-anchor="middle" fill="#ED8B00" opacity="0.8">Java</text>
    <!-- Rust -->
    <rect x="540" y="315" width="55" height="24" rx="12" fill="#CE422B" opacity="0.15" stroke="#CE422B" stroke-width="0.8" />
    <text x="567" y="331" text-anchor="middle" fill="#CE422B" opacity="0.8">Rust</text>
    <!-- JS Reverse -->
    <rect x="610" y="315" width="100" height="24" rx="12" fill="#F7DF1E" opacity="0.1" stroke="#F7DF1E" stroke-width="0.8" />
    <text x="660" y="331" text-anchor="middle" fill="#F7DF1E" opacity="0.8">JS Reverse</text>
    <!-- 23 AI Engines -->
    <rect x="720" y="315" width="95" height="24" rx="12" fill="#7b2fff" opacity="0.15" stroke="#7b2fff" stroke-width="0.8" />
    <text x="767" y="331" text-anchor="middle" fill="#7b2fff" opacity="0.8">23 AI Engines</text>
    <!-- MIT -->
    <rect x="825" y="315" width="45" height="24" rx="12" fill="#00ff88" opacity="0.15" stroke="#00ff88" stroke-width="0.8" />
    <text x="847" y="331" text-anchor="middle" fill="#00ff88" opacity="0.8">MIT</text>
  </g>
</svg>
