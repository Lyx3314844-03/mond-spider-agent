<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510"/>
      <stop offset="40%" style="stop-color:#0a0a2a"/>
      <stop offset="100%" style="stop-color:#0f0520"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b2fff"/>
      <stop offset="50%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b2fff;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#7b2fff"/>
      <stop offset="85%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.01"/>
    </linearGradient>
    <linearGradient id="spiderBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b2fff"/>
      <stop offset="100%" style="stop-color:#00f5ff"/>
    </linearGradient>
    <radialGradient id="glow1"><stop offset="0%" style="stop-color:#7b2fff;stop-opacity:0.2"/><stop offset="100%" style="stop-color:#7b2fff;stop-opacity:0"/></radialGradient>
    <radialGradient id="glow2"><stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0.15"/><stop offset="100%" style="stop-color:#00f5ff;stop-opacity:0"/></radialGradient>
    <radialGradient id="glow3"><stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.1"/><stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/></radialGradient>
    <filter id="neon"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="tinyGlow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Atmospheric glows -->
  <ellipse cx="600" cy="100" rx="400" ry="200" fill="url(#glow1)"/>
  <ellipse cx="200" cy="400" rx="250" ry="200" fill="url(#glow2)"/>
  <ellipse cx="1000" cy="450" rx="250" ry="200" fill="url(#glow3)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#ffffff" stroke-width="0.15" opacity="0.08">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/><line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
  </g>

  <!-- Network web connections -->
  <g stroke="#7b2fff" stroke-width="0.4" opacity="0.2">
    <line x1="60" y1="50" x2="180" y2="120"/><line x1="180" y1="120" x2="350" y2="70"/>
    <line x1="350" y1="70" x2="500" y2="130"/><line x1="500" y1="130" x2="600" y2="80"/>
    <line x1="600" y1="80" x2="750" y2="120"/><line x1="750" y1="120" x2="900" y2="60"/>
    <line x1="900" y1="60" x2="1050" y2="110"/><line x1="1050" y1="110" x2="1150" y2="70"/>
    <line x1="180" y1="120" x2="250" y2="530"/><line x1="500" y1="130" x2="450" y2="550"/>
    <line x1="750" y1="120" x2="800" y2="540"/><line x1="1050" y1="110" x2="1000" y2="530"/>
  </g>

  <!-- Network nodes -->
  <g filter="url(#tinyGlow)">
    <circle cx="60" cy="50" r="2.5" fill="#7b2fff" opacity="0.6"/>
    <circle cx="180" cy="120" r="3" fill="#7b2fff" opacity="0.7"/>
    <circle cx="350" cy="70" r="2.5" fill="#00f5ff" opacity="0.6"/>
    <circle cx="500" cy="130" r="3" fill="#00f5ff" opacity="0.7"/>
    <circle cx="750" cy="120" r="3" fill="#00f5ff" opacity="0.7"/>
    <circle cx="900" cy="60" r="2.5" fill="#00ff88" opacity="0.6"/>
    <circle cx="1050" cy="110" r="3" fill="#00ff88" opacity="0.7"/>
    <circle cx="1150" cy="70" r="2.5" fill="#00ff88" opacity="0.5"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.4">
    <circle cx="120" cy="200" r="1" fill="#7b2fff"/><circle cx="280" cy="350" r="1.2" fill="#00f5ff"/>
    <circle cx="450" cy="450" r="1" fill="#00ff88"/><circle cx="680" cy="380" r="1.5" fill="#7b2fff"/>
    <circle cx="820" cy="250" r="1" fill="#00f5ff"/><circle cx="950" cy="400" r="1.2" fill="#00ff88"/>
    <circle cx="1100" cy="300" r="1" fill="#7b2fff"/><circle cx="100" cy="480" r="1" fill="#00f5ff"/>
    <circle cx="550" cy="520" r="1.2" fill="#7b2fff"/><circle cx="1050" cy="500" r="1" fill="#00ff88"/>
  </g>

  <!-- ═══════ CENTRAL SPIDER ICON ═══════ -->
  <g transform="translate(600, 195)" filter="url(#softGlow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#spiderBody)" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#7b2fff" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,6"/>
    <!-- Body -->
    <ellipse cx="0" cy="-5" rx="18" ry="14" fill="url(#spiderBody)" opacity="0.6"/>
    <ellipse cx="0" cy="12" rx="14" ry="18" fill="url(#spiderBody)" opacity="0.5"/>
    <!-- Eyes -->
    <circle cx="-6" cy="-8" r="3" fill="#00f5ff" opacity="0.9"/>
    <circle cx="6" cy="-8" r="3" fill="#00f5ff" opacity="0.9"/>
    <circle cx="-6" cy="-8" r="1.5" fill="#ffffff" opacity="0.8"/>
    <circle cx="6" cy="-8" r="1.5" fill="#ffffff" opacity="0.8"/>
    <!-- 8 Legs -->
    <g stroke="url(#spiderBody)" stroke-width="1.5" fill="none" opacity="0.7">
      <path d="M-15,-8 Q-30,-25 -50,-35"/><path d="M15,-8 Q30,-25 50,-35"/>
      <path d="M-18,0 Q-35,-8 -55,-5"/><path d="M18,0 Q35,-8 55,-5"/>
      <path d="M-16,10 Q-35,8 -52,18"/><path d="M16,10 Q35,8 52,18"/>
      <path d="M-12,22 Q-28,30 -42,42"/><path d="M12,22 Q28,30 42,42"/>
    </g>
    <!-- Leg tips glow -->
    <g filter="url(#tinyGlow)">
      <circle cx="-50" cy="-35" r="2" fill="#7b2fff" opacity="0.8"/>
      <circle cx="50" cy="-35" r="2" fill="#00f5ff" opacity="0.8"/>
      <circle cx="-55" cy="-5" r="2" fill="#7b2fff" opacity="0.7"/>
      <circle cx="55" cy="-5" r="2" fill="#00f5ff" opacity="0.7"/>
      <circle cx="-52" cy="18" r="2" fill="#7b2fff" opacity="0.6"/>
      <circle cx="52" cy="18" r="2" fill="#00f5ff" opacity="0.6"/>
      <circle cx="-42" cy="42" r="2" fill="#7b2fff" opacity="0.5"/>
      <circle cx="42" cy="42" r="2" fill="#00ff88" opacity="0.5"/>
    </g>
  </g>

  <!-- ═══════ TITLE ═══════ -->
  <text x="600" y="120" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="900" font-size="72" fill="url(#titleGrad)" filter="url(#neon)" letter-spacing="15">MOND</text>
  <text x="600" y="160" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="300" font-size="28" fill="#ffffff" opacity="0.85" letter-spacing="22">SPIDER AGENT</text>

  <!-- Divider -->
  <rect x="250" y="170" width="700" height="1" fill="url(#lineGrad)"/>

  <!-- Tagline -->
  <text x="600" y="290" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="600" font-size="16" fill="#00f5ff" opacity="0.9">超级爬虫智能体 — 自进化 AI 爬虫系统</text>
  <text x="600" y="315" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="300" font-size="13" fill="#ffffff" opacity="0.5">4 Native Frameworks · 23 AI Subsystems · JS Reverse Engineering Suite</text>

  <!-- ═══════ CAPABILITY CARDS — LEFT COLUMN ═══════ -->
  <g font-family="'Segoe UI',Arial,sans-serif">

    <!-- Card 1: JS Reverse -->
    <g transform="translate(30, 340)">
      <rect width="270" height="100" rx="8" fill="url(#cardGrad)" stroke="#7b2fff" stroke-width="0.6" opacity="0.8"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#7b2fff" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" font-size="10" fill="#7b2fff" font-weight="700">JS</text>
      <text x="38" y="24" font-size="12" fill="#ffffff" font-weight="700">JS 逆向工程</text>
      <text x="15" y="44" font-size="9.5" fill="#aaaaaa">AST 反混淆 · Hook 注入 · 签名追踪 · WASM 解析</text>
      <text x="15" y="60" font-size="9" fill="#666666">解决: JS 混淆代码无法阅读、加密签名无法复现、</text>
      <text x="15" y="73" font-size="9" fill="#666666">WASM 模块无法分析、反爬加密参数无法绕过</text>
      <text x="210" y="90" font-size="9" fill="#7b2fff" font-weight="600">8 AST Passes →</text>
    </g>

    <!-- Card 2: Anti-Detection -->
    <g transform="translate(30, 455)">
      <rect width="270" height="100" rx="8" fill="url(#cardGrad)" stroke="#00f5ff" stroke-width="0.6" opacity="0.8"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#00f5ff" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" font-size="9" fill="#00f5ff" font-weight="700">AD</text>
      <text x="38" y="24" font-size="12" fill="#ffffff" font-weight="700">反检测与隐身</text>
      <text x="15" y="44" font-size="9.5" fill="#aaaaaa">指纹轮换 · 行为模拟 · Cloudflare/DataDome 绕过</text>
      <text x="15" y="60" font-size="9" fill="#666666">解决: 浏览器指纹被识别、行为被判定为机器人、</text>
      <text x="15" y="73" font-size="9" fill="#666666">Cloudflare/Akamai/DataDome 等 WAF 拦截</text>
      <text x="210" y="90" font-size="9" fill="#00f5ff" font-weight="600">4 浏览器策略 →</text>
    </g>

    <!-- Card 3: Self-Evolution -->
    <g transform="translate(30, 570)">
      <rect width="270" height="100" rx="8" fill="url(#cardGrad)" stroke="#00ff88" stroke-width="0.6" opacity="0.8"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#00ff88" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" font-size="8" fill="#00ff88" font-weight="700">SE</text>
      <text x="38" y="24" font-size="12" fill="#ffffff" font-weight="700">自进化引擎</text>
      <text x="15" y="44" font-size="9.5" fill="#aaaaaa">遗传算法 · 元认知 · 自主目标设定 · 代码合成</text>
      <text x="15" y="60" font-size="9" fill="#666666">解决: 爬虫策略需人工调优、新站点需从零适配、</text>
      <text x="15" y="73" font-size="9" fill="#666666">能力瓶颈无法自动发现、无持续学习机制</text>
      <text x="210" y="90" font-size="9" fill="#00ff88" font-weight="600">闭环进化 →</text>
    </g>

    <!-- ═══════ CAPABILITY CARDS — CENTER COLUMN ═══════ -->

    <!-- Card 4: Multi-Framework -->
    <g transform="translate(320, 340)">
      <rect width="270" height="100" rx="8" fill="url(#cardGrad)" stroke="#7b2fff" stroke-width="0.6" opacity="0.8"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#7b2fff" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" font-size="8" fill="#7b2fff" font-weight="700">4F</text>
      <text x="38" y="24" font-size="12" fill="#ffffff" font-weight="700">四原生框架引擎</text>
      <text x="15" y="44" font-size="9.5" fill="#aaaaaa">Go · Python · Java · Rust + Apify 云</text>
      <text x="15" y="60" font-size="9" fill="#666666">解决: 单一语言性能瓶颈、分布式扩展困难、</text>
      <text x="15" y="73" font-size="9" fill="#666666">企业级容错缺失、云部署不灵活</text>
      <text x="210" y="90" font-size="9" fill="#7b2fff" font-weight="600">自动调度 →</text>
    </g>

    <!-- Card 5: Knowledge & Transfer -->
    <g transform="translate(320, 455)">
      <rect width="270" height="100" rx="8" fill="url(#cardGrad)" stroke="#00f5ff" stroke-width="0.6" opacity="0.8"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#00f5ff" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" font-size="8" fill="#00f5ff" font-weight="700">KG</text>
      <text x="38" y="24" font-size="12" fill="#ffffff" font-weight="700">知识图谱与迁移学习</text>
      <text x="15" y="44" font-size="9.5" fill="#aaaaaa">实体关系图 · 跨域策略迁移 · 站点因果建模</text>
      <text x="15" y="60" font-size="9" fill="#666666">解决: 每次爬取从零开始、同类站点重复踩坑、</text>
      <text x="15" y="73" font-size="9" fill="#666666">历史经验无法复用、站点结构变化无法预测</text>
      <text x="210" y="90" font-size="9" fill="#00f5ff" font-weight="600">跨域复用 →</text>
    </g>

    <!-- Card 6: Swarm Intelligence -->
    <g transform="translate(320, 570)">
      <rect width="270" height="100" rx="8" fill="url(#cardGrad)" stroke="#00ff88" stroke-width="0.6" opacity="0.8"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#00ff88" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" font-size="8" fill="#00ff88" font-weight="700">MA</text>
      <text x="38" y="24" font-size="12" fill="#ffffff" font-weight="700">群体智能协调</text>
      <text x="15" y="44" font-size="9.5" fill="#aaaaaa">角色分工 · 任务规划 · 自愈修复 · 质量评审</text>
      <text x="15" y="60" font-size="9" fill="#666666">解决: 单 Agent 能力有限、复杂任务无法分解、</text>
      <text x="15" y="73" font-size="9" fill="#666666">爬取失败无自动恢复、输出质量无保障</text>
      <text x="210" y="90" font-size="9" fill="#00ff88" font-weight="600">协同作战 →</text>
    </g>

    <!-- ═══════ CAPABILITY CARDS — RIGHT COLUMN ═══════ -->

    <!-- Card 7: Smart Pipeline -->
    <g transform="translate(610, 340)">
      <rect width="270" height="100" rx="8" fill="url(#cardGrad)" stroke="#7b2fff" stroke-width="0.6" opacity="0.8"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#7b2fff" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" font-size="8" fill="#7b2fff" font-weight="700">SP</text>
      <text x="38" y="24" font-size="12" fill="#ffffff" font-weight="700">智能爬虫流水线</text>
      <text x="15" y="44" font-size="9.5" fill="#aaaaaa">缓存预判 · 策略推荐 · 代理轮换 · 自动回退</text>
      <text x="15" y="60" font-size="9" fill="#666666">解决: 重复请求浪费资源、策略选择靠猜、</text>
      <text x="15" y="73" font-size="9" fill="#666666">被封后无备选方案、爬取效率低下</text>
      <text x="210" y="90" font-size="9" fill="#7b2fff" font-weight="600">8 步流水线 →</text>
    </g>

    <!-- Card 8: Code Synthesis -->
    <g transform="translate(610, 455)">
      <rect width="270" height="100" rx="8" fill="url(#cardGrad)" stroke="#00f5ff" stroke-width="0.6" opacity="0.8"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#00f5ff" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" font-size="8" fill="#00f5ff" font-weight="700">CS</text>
      <text x="38" y="24" font-size="12" fill="#ffffff" font-weight="700">LLM 代码合成</text>
      <text x="15" y="44" font-size="9.5" fill="#aaaaaa">Python 模块生成 · AST 验证 · 沙箱测试 · 选择器自愈</text>
      <text x="15" y="60" font-size="9" fill="#666666">解决: 新站点需手写爬虫、CSS/XPath 频繁失效、</text>
      <text x="15" y="73" font-size="9" fill="#666666">选择器维护成本高、无法自动生成回放脚本</text>
      <text x="210" y="90" font-size="9" fill="#00f5ff" font-weight="600">自动生成 →</text>
    </g>

    <!-- Card 9: Deployment -->
    <g transform="translate(610, 570)">
      <rect width="270" height="100" rx="8" fill="url(#cardGrad)" stroke="#00ff88" stroke-width="0.6" opacity="0.8"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#00ff88" stroke-width="1.5"/>
      <text x="20" y="24" text-anchor="middle" font-size="8" fill="#00ff88" font-weight="700">DP</text>
      <text x="38" y="24" font-size="12" fill="#ffffff" font-weight="700">灵活部署</text>
      <text x="15" y="44" font-size="9.5" fill="#aaaaaa">Docker · Kubernetes · 单机 · Apify 云 Actor</text>
      <text x="15" y="60" font-size="9" fill="#666666">解决: 环境配置复杂、难以水平扩展、</text>
      <text x="15" y="73" font-size="9" fill="#666666">云端调度不便、本地与云端不互通</text>
      <text x="210" y="90" font-size="9" fill="#00ff88" font-weight="600">一键部署 →</text>
    </g>

    <!-- ═══════ RIGHT PANEL — STATS ═══════ -->
    <g transform="translate(910, 340)">
      <rect width="260" height="330" rx="8" fill="url(#cardGrad)" stroke="#ffffff" stroke-width="0.3" opacity="0.5"/>

      <text x="130" y="30" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600" opacity="0.7">SYSTEM OVERVIEW</text>
      <rect x="30" y="40" width="200" height="0.5" fill="url(#lineGrad)"/>

      <!-- Stats -->
      <text x="30" y="70" font-size="28" fill="#7b2fff" font-weight="900">23</text>
      <text x="70" y="70" font-size="11" fill="#aaaaaa">AI Subsystems</text>

      <text x="30" y="100" font-size="28" fill="#00f5ff" font-weight="900">4</text>
      <text x="55" y="100" font-size="11" fill="#aaaaaa">Native Frameworks</text>

      <text x="30" y="130" font-size="28" fill="#00ff88" font-weight="900">8</text>
      <text x="55" y="130" font-size="11" fill="#aaaaaa">AST Deobfuscation Passes</text>

      <text x="30" y="160" font-size="28" fill="#ff006e" font-weight="900">7</text>
      <text x="55" y="160" font-size="11" fill="#aaaaaa">Hook Categories</text>

      <text x="30" y="190" font-size="28" fill="#ffbe0b" font-weight="900">23/23</text>
      <text x="110" y="190" font-size="11" fill="#aaaaaa">Benchmark Passed</text>

      <rect x="30" y="205" width="200" height="0.5" fill="url(#lineGrad)"/>

      <text x="130" y="230" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600" opacity="0.6">SUPPORTED SIGNATURES</text>
      <text x="30" y="252" font-size="9" fill="#7b2fff" opacity="0.8">X-Sign  X-Bogus  X-Khronos  X-Gorgon</text>
      <text x="30" y="268" font-size="9" fill="#00f5ff" opacity="0.8">X-Helios  X-Ladon  X-Argus  token</text>
      <text x="30" y="284" font-size="9" fill="#00ff88" opacity="0.8">sign  signature  _signature  custom</text>

      <rect x="30" y="296" width="200" height="0.5" fill="url(#lineGrad)"/>

      <text x="130" y="318" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600" opacity="0.6">ANTI-BOT SYSTEMS</text>
      <text x="30" y="338" font-size="9" fill="#ff006e" opacity="0.8">Cloudflare · Akamai · DataDome · PerimeterX</text>
    </g>

  </g>

  <!-- Bottom bar -->
  <rect x="0" y="595" width="1200" height="5" fill="url(#lineGrad)" opacity="0.3"/>
</svg>
